version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: kanban-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - kanban-network
    restart: unless-stopped

  backend:
    build:
      context: ./kanbanflow-backend
      dockerfile: Dockerfile
    container_name: kanban-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/kanbanflow
    depends_on:
      - mongodb
    networks:
      - kanban-network
    restart: unless-stopped

  frontend:
    build:
      context: ./kanbanflow-frontend
      dockerfile: Dockerfile
    container_name: kanban-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - kanban-network
    restart: unless-stopped

networks:
  kanban-network:
    driver: bridge

volumes:
  mongodb_data:
